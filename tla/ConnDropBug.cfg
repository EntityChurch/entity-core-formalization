\* LIVENESS NEGATIVE CONTROL — responder drops frames (DropFrame = TRUE): a frame may be consumed
\* without being answered. Expect AllAnswered VIOLATED (answered never reaches MaxFrames). Safety
\* invariants still hold. Run: make tlc SPEC=Conn CFG=ConnDropBug
SPECIFICATION Spec
CONSTANT MaxFrames = 3
CONSTANT Enforce = TRUE
CONSTANT DropFrame = TRUE
INVARIANT TokenBounded
INVARIANT NoEstablishWithoutNonce
INVARIANT DispatchedImpliesEstablished
PROPERTY AllAnswered
