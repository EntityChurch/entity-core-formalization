\* revocation marker no longer makes the cap fail. Expect RevokedNeverPasses VIOLATED — a peer
\* that has observed the revocation still produces a passing verdict.
\* Run: make tlc SPEC=Revoke CFG=RevokeIgnoreBug
SPECIFICATION Spec
