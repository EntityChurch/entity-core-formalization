\* LIVENESS NEGATIVE CONTROL — registration wedge (WedgeReg = TRUE): a live handler is never
\* torn down or settled (it parks in a "wedged" terminal). Expect RegisterSettles VIOLATED.
\* Safety holds (the wedged handler is fully present and coherent — only progress fails).
\* Run: make tlc SPEC=Register CFG=RegisterWedgeBug
SPECIFICATION Spec
CONSTANT Atomic = TRUE
CONSTANT GuardSystem = TRUE
CONSTANT WedgeReg = TRUE
INVARIANT NoPartialResidue
INVARIANT RegisterAllOrNothing
INVARIANT IndexMatchesTree
INVARIANT NoUserAtSystem
PROPERTY RegisterSettles
