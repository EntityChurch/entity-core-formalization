\* NEGATIVE CONTROL: responder skips the §4.6 hello-before-auth ordering + issued-nonce
\* bind (Enforce = FALSE). Expect NoEstablishWithoutNonce to be VIOLATED — an authenticate
\* with nonce "N1" establishes the connection straight from phase "new", no hello.
\* Run: make tlc SPEC=Conn CFG=ConnBug
SPECIFICATION Spec
CONSTANT MaxFrames = 3
CONSTANT Enforce = FALSE
CONSTANT DropFrame = FALSE
INVARIANT TokenBounded
INVARIANT NoEstablishWithoutNonce
INVARIANT DispatchedImpliesEstablished
PROPERTY AllAnswered
