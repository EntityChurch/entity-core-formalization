\* LIVENESS NEGATIVE CONTROL — §4.9(c) deliver-or-signal dropped (SilentDrop = TRUE): an admitted
\* request may leave the write critical section without responding, leaking its pending slot.
\* Expect Responsive VIOLATED (an admitted request never reaches "responded") and Recovers
\* VIOLATED (pending never drains to 0). Safety invariants still hold (the bound is not exceeded;
\* the work is lost, not over-admitted). Run: make tlc SPEC=Store CFG=StoreDropBug
SPECIFICATION Spec
CONSTANT NReq = 3
CONSTANT MaxPending = 2
CONSTANT MaxStore = 2
CONSTANT Serialize = TRUE
CONSTANT Admit = TRUE
CONSTANT SilentDrop = TRUE
INVARIANT StoreRaceFree
INVARIANT ResourceBounded
INVARIANT CleanReject
PROPERTY Responsive
PROPERTY Recovers
