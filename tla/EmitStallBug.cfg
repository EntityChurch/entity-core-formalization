\* LIVENESS NEGATIVE CONTROL — emit halts early (StallEmit = TRUE): the emit pathway may stop
\* before completing its op sequence. Expect EmitTerminates VIOLATED. Safety invariants still hold.
\* Run: make tlc SPEC=Emit CFG=EmitStallBug
SPECIFICATION Spec
CONSTANT Fire = TRUE
CONSTANT MarkerDeletes = FALSE
CONSTANT MaxOps = 3
CONSTANT StallEmit = TRUE
INVARIANT EventIffRealWork
INVARIANT NoEventOnNoop
INVARIANT EventTypeCorrect
PROPERTY EmitTerminates
