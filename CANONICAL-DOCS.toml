[project]
name   = "Entity Core Formalization"
slug   = "entity-core-formalization"
repo   = "entity-core-formalization"
github = "https://github.com/EntityChurch/entity-core-formalization"
intro  = """
Formal design assurance for the Entity Core Protocol (v7). This repo machine-
checks MODELS of the V7 design on the two layers the Lean proof work structurally
cannot reach: distributed correctness + liveness under concurrency (TLA+, cross-
checked by an independent Spin re-encoding and unbounded Apalache SMT proofs), and
active-attacker protocol security (Tamarin + ProVerif, Dolev-Yao). It is a sibling
to entity-core-architecture (the spec authority), entity-core-keystone (peers +
the Lean logic proof), and the reference implementations — it verifies the DESIGN,
not the code and not any generated peer.

Honesty first (this is design assurance, off the release critical path): it is a
strong DEMONSTRATOR, not a closed proof, and NOT a claim that "the protocol is
proven correct." What is PROVEN unbounded vs only MODELED at a bound vs symbolic is
stated exactly in docs/PROPERTIES.md; the deepest assumption — spec↔model fidelity,
which no tool here closes — is named, not hidden. Build is make + podman only (no
native model-checker toolchain on the host): `make build` then `make check` on a
fresh clone runs the whole green matrix, with per-container resource caps so a
runaway check dies at the cap instead of taking the host down.
"""

